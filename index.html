
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

        <div class="calculator">

            <div class="top-bar">
                <h2>Scientific Calculator</h2>

                <div class="top-buttons">
                    <button id="modeBtn">DEG</button>
                    <button id="copyBtn">COPY</button>
                </div>
            </div>

            <div class="history-box">
                <h3>History</h3>
                <ul id="history"></ul>
            </div>

            <input
                type="text"
                id="display"
                class="display"
                readonly
            >

            <div class="buttons">

                <button onclick="clearDisplay()" class="special">AC</button>
                <button onclick="backspace()" class="special">DEL</button>
                <button onclick="append('%')">%</button>
                <button onclick="append('/')">÷</button>

                <button onclick="append('sin(')">sin</button>
                <button onclick="append('cos(')">cos</button>
                <button onclick="append('tan(')">tan</button>
                <button onclick="append('*')">×</button>

                <button onclick="append('log(')">log</button>
                <button onclick="append('ln(')">ln</button>
                <button onclick="append('sqrt(')">√</button>
                <button onclick="append('-')">−</button>

                <button onclick="append('(')">(</button>
                <button onclick="append(')')">)</button>
                <button onclick="append('^')">xʸ</button>
                <button onclick="append('+')">+</button>

                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="factorial()">x!</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="append('π')">π</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="append('e')">e</button>

                <button onclick="append('0')">0</button>
                <button onclick="append('.')">.</button>
                <button onclick="square()">x²</button>

                <button onclick="calculate()" class="equal">
                    =
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
